name: Daily Discord Notification

on:
  schedule:
    - cron: '18 1 * * *'  # 8:18pm EST (UTC-5) = 1:18am UTC (Nov–Mar)
    - cron: '18 0 * * *'  # 8:18pm EDT (UTC-4) = 0:18am UTC (Mar–Nov)
  workflow_dispatch:       # also triggerable manually from GitHub UI

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Start backend and send notification
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_GMAIL_REFRESH_TOKEN: ${{ secrets.GOOGLE_GMAIL_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cd backend
          ./gradlew bootRun &

          echo "Waiting for backend to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080/api/health | grep -q ok; then
              echo "Backend is ready"
              break
            fi
            echo "Attempt $i/30..."
            sleep 5
          done

          curl -sf -X POST http://localhost:8080/api/discord/send
          echo "Discord notification sent"
