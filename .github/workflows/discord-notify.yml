name: Daily Discord Notification

on:
  schedule:
    - cron: '18 23 * * *'  # 7:18pm EST / 8:18pm EDT = 23:18 UTC
  workflow_dispatch:       # also triggerable manually from GitHub UI

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Validate API keys
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_GMAIL_REFRESH_TOKEN: ${{ secrets.GOOGLE_GMAIL_REFRESH_TOKEN }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            https://api.groq.com/openai/v1/models)
          [ "$status" = "200" ] || { echo "Groq API key invalid (HTTP $status)"; exit 1; }

          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -d "client_id=$GOOGLE_CLIENT_ID&client_secret=$GOOGLE_CLIENT_SECRET&refresh_token=$GOOGLE_GMAIL_REFRESH_TOKEN&grant_type=refresh_token" \
            https://oauth2.googleapis.com/token)
          [ "$status" = "200" ] || { echo "Google refresh token invalid (HTTP $status)"; exit 1; }

          echo "All API keys valid"

      - name: Start backend and send notification
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_GMAIL_REFRESH_TOKEN: ${{ secrets.GOOGLE_GMAIL_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cd backend
          ./gradlew bootRun &

          echo "Waiting for backend to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080/api/health | grep -q ok; then
              echo "Backend is ready"
              break
            fi
            echo "Attempt $i/30..."
            sleep 5
          done

          curl -sf -X POST http://localhost:8080/api/discord/send
          echo "Discord notification sent"
