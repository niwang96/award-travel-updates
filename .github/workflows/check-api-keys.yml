name: Weekly API Key Health Check

on:
  schedule:
    - cron: '0 13 * * 1'  # Every Monday at 9am EST (UTC-4)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Groq API key
        id: groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            https://api.groq.com/openai/v1/models)
          if [ "$status" != "200" ]; then
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "Groq API key invalid (HTTP $status)"
          else
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "Groq API key OK"
          fi

      - name: Check Google refresh token
        id: google
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_GMAIL_REFRESH_TOKEN: ${{ secrets.GOOGLE_GMAIL_REFRESH_TOKEN }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -d "client_id=$GOOGLE_CLIENT_ID&client_secret=$GOOGLE_CLIENT_SECRET&refresh_token=$GOOGLE_GMAIL_REFRESH_TOKEN&grant_type=refresh_token" \
            https://oauth2.googleapis.com/token)
          if [ "$status" != "200" ]; then
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "Google refresh token invalid (HTTP $status)"
          else
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "Google refresh token OK"
          fi

      - name: Alert on Discord if any key is invalid
        if: steps.groq.outputs.valid == 'false' || steps.google.outputs.valid == 'false'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          msg=""
          [ "${{ steps.groq.outputs.valid }}" = "false" ] && msg="${msg}• Groq API key is expired — rotate at https://console.groq.com/keys\n"
          [ "${{ steps.google.outputs.valid }}" = "false" ] && msg="${msg}• Google refresh token is expired — re-run the OAuth flow to get a new one\n"

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"**⚠️ API Key Rotation Required**\n${msg}\"}"

      - name: Fail if any key is invalid
        if: steps.groq.outputs.valid == 'false' || steps.google.outputs.valid == 'false'
        run: exit 1
